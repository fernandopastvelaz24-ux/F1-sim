<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulador F1 - Realismo Acústico Puro</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background-color: #05070a; font-family: 'Arial', sans-serif; color: #ffffff; display: flex; flex-direction: column; justify-content: space-between; height: 100vh; overflow: hidden; }
        .dash-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px; }
        .gear-display { font-size: 140px; font-weight: bold; color: #ff3333; text-shadow: 0 0 30px rgba(255, 51, 51, 0.6); line-height: 0.9; margin-bottom: 5px; }
        .rpm-text { font-size: 28px; color: #00ffcc; font-family: monospace; letter-spacing: 2px; margin-bottom: 20px; text-shadow: 0 0 10px rgba(0,255,204,0.3); }
        .pedals-container { display: flex; width: 90%; max-width: 400px; gap: 20px; margin-bottom: 20px; }
        .pedal-bar-wrapper { flex: 1; height: 130px; background-color: #11161b; border-radius: 8px; position: relative; overflow: hidden; border: 2px solid #222e3b; }
        .pedal-fill { position: absolute; bottom: 0; width: 100%; height: 0%; transition: height 0.08s ease-out; }
        #brake-fill { background: linear-gradient(to top, #4a0000, #ff3333); box-shadow: 0 0 15px rgba(255,51,51,0.5); }
        #throttle-fill { background: linear-gradient(to top, #004a33, #00ffcc); box-shadow: 0 0 15px rgba(0,255,204,0.5); }
        .pedal-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; font-size: 16px; text-transform: uppercase; z-index: 2; text-shadow: 1px 1px 4px rgba(0,0,0,0.9); color: #888; }
        .controls-container { background-color: #0b0f14; padding: 20px; display: flex; justify-content: space-around; align-items: center; border-top: 2px solid #1a232d; gap: 12px; }
        .btn { flex: 1; padding: 24px 10px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; color: white; text-transform: uppercase; box-shadow: 0 5px 0 #000; transition: all 0.05s; background-color: #1f2731; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #000; }
        .btn-brake { background-color: #aa1133; }
        .btn-gear { background-color: #007799; }
        .btn-throttle { background-color: #008855; }
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #start-btn { background: #ff3333; color: white; border: none; padding: 15px 40px; font-size: 18px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="font-family:monospace; font-size:32px; margin-bottom:20px; color:#00ffcc;">ENGINES READY</h1>
        <button id="start-btn">START SIMULATION</button>
    </div>

    <div class="dash-container">
        <div class="gear-display" id="gear-indicator">1</div>
        <div class="rpm-text" id="rpm-indicator">RPM: 4000</div>

        <div class="pedals-container">
            <div class="pedal-bar-wrapper">
                <div class="pedal-label">Freno</div>
                <div class="pedal-fill" id="brake-fill"></div>
            </div>
            <div class="pedal-bar-wrapper">
                <div class="pedal-label">Gas</div>
                <div class="pedal-fill" id="throttle-fill"></div>
            </div>
        </div>
    </div>

    <div class="controls-container">
        <button class="btn btn-brake" id="btn-brake">Freno</button>
        <button class="btn btn-gear" id="btn-down">Down</button>
        <button class="btn btn-gear" id="btn-up">Up</button>
        <button class="btn btn-throttle" id="btn-throttle">Gas</button>
    </div>

    <script>
        // Elementos de interfaz
        const gearIndicator = document.getElementById('gear-indicator');
        const rpmIndicator = document.getElementById('rpm-indicator');
        const throttleFill = document.getElementById('throttle-fill');
        const brakeFill = document.getElementById('brake-fill');

        // Configuración nativa de los elementos de Audio HTML5
        const audioReposo = new Audio('motor_reposo.mp3');
        const audioRectaFull = new Audio('recta_full.mp3');
        const audioSubiendoMarchas = new Audio('subiendo_marchas.mp3');
        const audioContinuacionDown = new Audio('continuacion_down.mp3');
        const audioUp = new Audio('click_up.mp3');
        const audioDown = new Audio('down_marcha.mp3');

        // Forzar loops infinitos donde se requiere estabilidad continua
        audioReposo.loop = true;
        audioRectaFull.loop = true;

        // Variables de Control de Estado del Simulador
        let marchaActual = 1;
        let rpm = 4000;
        let iniciado = false;
        let acelerando = false;
        let frenando = false;
        let enSecuenciaLarga = false;

        // Nodos del procesador Web Audio API para mezcla ultrasuave (Anti-clics)
        let audioCtx, gainReposo, gainRecta, gainSecuencia, gainContDown;

        function initWebAudio() {
            if (iniciado) return;
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Creamos reguladores de volumen virtuales para cada pista
            gainReposo = audioCtx.createGain();
            gainRecta = audioCtx.createGain();
            gainSecuencia = audioCtx.createGain();
            gainContDown = audioCtx.createGain();

            // Enlazamos los audios al mezclador inteligente
            audioCtx.createMediaElementSource(audioReposo).connect(gainReposo).connect(audioCtx.destination);
            audioCtx.createMediaElementSource(audioRecta).connect(gainRecta).connect(audioCtx.destination);
            audioCtx.createMediaElementSource(audioSubiendoMarchas).connect(gainSecuencia).connect(audioCtx.destination);
            audioCtx.createMediaElementSource(audioContinuacionDown).connect(gainContDown).connect(audioCtx.destination);

            // Valores iniciales seguros (Todo mudo excepto reposo)
            gainReposo.gain.setValueAtTime(1.0, audioCtx.currentTime);
            gainRecta.gain.setValueAtTime(0.0, audioCtx.currentTime);
            gainSecuencia.gain.setValueAtTime(0.0, audioCtx.currentTime);
            gainContDown.gain.setValueAtTime(0.0, audioCtx.currentTime);

            // Arrancar de fondo todos los hilos simultáneamente para sincronía milimétrica
            audioReposo.play().catch(e => {});
            audioRecta.play().catch(e => {});
            audioSubiendoMarchas.play().catch(e => {});
            audioSubiendoMarchas.pause(); // Esta se dispara por eventos táctiles
            audioContinuacionDown.play().catch(e => {});
            audioContinuacionDown.pause();

            iniciado = true;
        }

        // --- SISTEMA DE MANEJO DE ACELERACIÓN (GAS) ---
        function presionarGas() {
            initWebAudio();
            acelerando = true;
            frenando = false;
            throttleFill.style.height = "100%";
            brakeFill.style.height = "0%";

            let t = audioCtx.currentTime;
            
            // Desvanecer retenciones previas limpiamente en 0.05 segundos (Elimina cortes feos)
            gainContDown.gain.setTargetAtTime(0.0, t, 0.03);
            gainReposo.gain.setTargetAtTime(0.0, t, 0.03);

            if (marchaActual >= 3) {
                enSecuenciaLarga = true;
                gainRecta.gain.setTargetAtTime(0.0, t, 0.03);
                
                // Si el audio secuencial largo estaba detenido, lo reengancha fluido
                if (audioSubiendoMarchas.paused) {
                    audioSubiendoMarchas.play().catch(e => {});
                }
                gainSecuencia.gain.setTargetAtTime(1.0, t, 0.05);
            } else {
                enSecuenciaLarga = false;
                gainSecuencia.gain.setTargetAtTime(0.0, t, 0.03);
                gainRecta.gain.setTargetAtTime(1.0, t, 0.05);
            }
        }

        function soltarGas() {
            acelerando = false;
            throttleFill.style.height = "0%";
            if (frenando) return; // Si ya se presionó el freno, la función de freno toma el control total

            let t = audioCtx.currentTime;
            // Transición suave de vuelta al ralentí (reposo)
            gainRecta.gain.setTargetAtTime(0.0, t, 0.06);
            gainSecuencia.gain.setTargetAtTime(0.0, t, 0.06);
            gainReposo.gain.setTargetAtTime(1.0, t, 0.08);
        }

        // --- SISTEMA DE MANEJO DE FRENOS (RETENCIÓN) ---
        function presionarFreno() {
            initWebAudio();
            frenando = true;
            acelerando = false;
            brakeFill.style.height = "100%";
            throttleFill.style.height = "0%";

            let t = audioCtx.currentTime;
            enSecuenciaLarga = false;

            // Apagar instantáneamente pero con rampa limpia el empuje del motor a fondo
            gainRecta.gain.setTargetAtTime(0.0, t, 0.03);
            gainSecuencia.gain.setTargetAtTime(0.0, t, 0.03);
            
            // Traer al frente el motor en reposo de base
            gainReposo.gain.setTargetAtTime(1.0, t, 0.05);
        }

        function soltarFreno() {
            frenando = false;
            brakeFill.style.height = "0%";
        }

        // Eventos Táctiles Adaptados para Pantallas de Celulares
        document.getElementById('btn-throttle').addEventListener('touchstart', (e) => { e.preventDefault(); presionarGas(); });
        document.getElementById('btn-throttle').addEventListener('touchend', (e) => { e.preventDefault(); soltarGas(); });
        document.getElementById('btn-throttle').addEventListener('mousedown', presionarGas);
        document.getElementById('btn-throttle').addEventListener('mouseup', soltarGas);

        document.getElementById('btn-brake').addEventListener('touchstart', (e) => { e.preventDefault(); presionarFreno(); });
        document.getElementById('btn-brake').addEventListener('touchend', (e) => { e.preventDefault(); soltarFreno(); });
        document.getElementById('btn-brake').addEventListener('mousedown', presionarFreno);
        document.getElementById('btn-brake').addEventListener('mouseup', soltarFreno);


        // --- CAMBIO DE MARCHAS ULTRA-SINCRONIZADO (UP / DOWN) ---
        document.getElementById('btn-up').addEventListener('click', () => {
            initWebAudio();
            if (marchaActual < 8) {
                marchaActual++;

                // Efecto "Corte de Inyección": Baja el volumen general 60ms para simular el engranaje neumático
                let t = audioCtx.currentTime;
                gainSecuencia.gain.setValueAtTime(0.1, t);
                gainRecta.gain.setValueAtTime(0.1, t);
                
                // Suena el gatillo metálico secuencial corto
                audioUp.currentTime = 0;
                audioUp.play().catch(e => {});

                // Restaurar el volumen dinámicamente justo después del golpe de la caja
                setTimeout(() => {
                    let now = audioCtx.currentTime;
                    if (acelerando) {
                        if (marchaActual >= 3) {
                            enSecuenciaLarga = true;
                            audioSubiendoMarchas.play().catch(e => {});
                            gainSecuencia.gain.setTargetAtTime(1.0, now, 0.04);
                        } else {
                            gainRecta.gain.setTargetAtTime(1.0, now, 0.04);
                        }
                    }
                }, 60);

                actualizarPantalla();
            }
        });

        document.getElementById('btn-down').addEventListener('click', () => {
            initWebAudio();
            if (marchaActual > 1) {
                marchaActual--;
                enSecuenciaLarga = false;
                let t = audioCtx.currentTime;

                // Suena el latigazo/explosión del rebaje (0.4s)
                audioDown.currentTime = 0;
                audioDown.play().catch(e => {});

                // Disparar en paralelo la continuación de retención de 3 segundos
                audioContinuacionDown.currentTime = 0;
                audioContinuacionDown.play().catch(e => {});
                
                // Web Audio API cruza el volumen: sube la retención y atenúa suavemente el motor largo de fondo
                gainContDown.gain.setValueAtTime(1.0, t);
                gainSecuencia.gain.setTargetAtTime(0.0, t, 0.02);
                
                // Si el piloto clava el acelerador rápido en plena reducción, el sonido de fondo se re-acomoda
                if (acelerando) {
                    gainRecta.gain.setTargetAtTime(1.0, t, 0.05);
                } else {
                    gainReposo.gain.setTargetAtTime(1.0, t, 0.04);
                }

                actualizarPantalla();
            }
        });

        function actualizarPantalla() {
            gearIndicator.innerText = marchaActual;
            // Cálculo dinámico realista de RPM según comportamiento instantáneo
            if (acelerando) {
                rpm = Math.floor(12000 + (marchaActual * 200) + (Math.random() * 120));
            } else if (frenando) {
                rpm = Math.floor(6500 + (marchaActual * 180));
            } else {
                rpm = Math.floor(4000 + (Math.random() * 60));
            }
            rpmIndicator.innerText = `RPM: ${rpm}`;
        }

        // Bucle inteligente de monitoreo de hilos a 30 FPS
        setInterval(() => {
            if (!iniciado) return;
            actualizarPantalla();

            // Lógica de seguridad para el fin de pista de 22s: Transición indetectable al bucle de la Recta Full
            if (marchaActual === 8 && enSecuenciaLarga && audioSubiendoMarchas.currentTime >= 21.4) {
                let now = audioCtx.currentTime;
                enSecuenciaLarga = false;
                gainRecta.gain.setTargetAtTime(1.0, now, 0.05);
                gainSecuencia.gain.setTargetAtTime(0.0, now, 0.05);
            }
        }, 1000 / 30);

        // Control de arranque general de la interfaz
        document.getElementById('start-btn').addEventListener('click', () => {
            initWebAudio();
            document.getElementById('start-overlay').style.display = 'none';
        });
    </script>
</body>
</html>
