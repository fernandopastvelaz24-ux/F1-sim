<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>F1 Telemetry Simulator - V2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables for Easy Theming */
        :root {
            --bg-dark: #0a0e17;
            --bg-panel: #141b25;
            --border-panel: #2a3441;
            --accent-green: #00ffcc;
            --accent-red: #ff3333;
            --accent-yellow: #ffeb3b;
            --accent-blue: #00ffff;
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
            --font-mono: 'Share Tech Mono', monospace;
            --font-sans: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg-dark); 
            color: var(--text-main); 
            font-family: var(--font-sans); 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            background-image: 
                linear-gradient(rgba(10, 14, 23, 0.9), rgba(10, 14, 23, 0.9)),
                repeating-linear-gradient(45deg, #111 0px, #111 2px, transparent 2px, transparent 4px);
        }
        
        /* Main Dashboard Container - Wider and more structured */
        #dashboard-container { 
            width: 100%; 
            max-width: 600px; 
            background: var(--bg-panel); 
            border: 1px solid var(--border-panel); 
            border-radius: 16px; 
            padding: 24px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05); 
            position: relative; 
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        /* Header / Logo Area */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-panel);
            padding-bottom: 12px;
        }
        .dashboard-title {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--accent-green);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-green);
            animation: pulse 2s infinite;
        }

        /* RPM LED Bar - Re-styled to look like a physical component */
        .led-module {
            background: #05080c;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #1a222c;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        .led-strip { 
            display: flex; 
            justify-content: center; 
            gap: 6px; 
            flex-grow: 1;
        }
        .led { 
            width: 16px; 
            height: 12px; 
            border-radius: 2px; 
            background: #111; 
            transition: background 0.05s; 
            opacity: 0.2; 
            border: 1px solid #222;
        }
        .led.verde { background: var(--accent-green); border-color: #00aa88;}
        .led.rojo { background: var(--accent-red); border-color: #aa0000;}
        .led.azul { background: var(--accent-blue); border-color: #00aaaa;}
        .led.active { opacity: 1; box-shadow: 0 0 12px currentColor; }
        .led.blink { animation: parpadeo 0.08s infinite alternate; }
        @keyframes parpadeo { from { opacity: 0.1; } to { opacity: 1; } }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* Main Telemetry Display */
        .telemetry-display { 
            display: grid; 
            grid-template-columns: 1fr 1.2fr 1fr; 
            gap: 15px;
        }
        
        .data-panel {
            background: #090c12;
            border: 1px solid var(--border-panel);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }
        
        .data-panel::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }

        .data-label { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
        .data-value { font-family: var(--font-mono); font-size: 32px; font-weight: normal; color: var(--text-main); }
        .data-unit { font-size: 12px; color: var(--text-muted); margin-left: 4px; }

        .speed-panel .data-value { color: var(--accent-blue); }
        
        .gear-panel {
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a222c 0%, #090c12 100%);
            border-color: #3a4b61;
        }
        .gear-panel .data-label { text-align: center; }
        #val-gear { 
            font-family: var(--font-mono); 
            font-size: 80px; 
            color: var(--accent-yellow); 
            line-height: 1; 
            text-shadow: 0 0 20px rgba(255,235,59,0.3); 
        }

        .rpm-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            background: #090c12;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-panel);
            font-family: var(--font-mono);
        }
        .rpm-value { color: var(--accent-red); font-size: 24px; }

        /* Controls Area */
        .controls-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Paddle Shifters */
        .paddle { 
            background: linear-gradient(180deg, #2a3441 0%, #1a222c 100%); 
            border: 1px solid #3a4b61; 
            color: var(--text-main); 
            padding: 16px; 
            font-family: var(--font-sans);
            font-size: 14px; 
            font-weight: 600; 
            border-radius: 8px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .paddle:active { 
            transform: translateY(2px); 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); 
            background: #1a222c; 
        }
        .paddle-icon { font-size: 18px; }

        /* Pedals */
        .pedal-container {
            grid-column: span 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            height: 140px;
        }
        
        .pedal-wrapper { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100%; 
        }
        
        .pedal-base { 
            width: 100%; 
            height: 100%; 
            background: #090c12; 
            border: 2px solid var(--border-panel); 
            border-radius: 8px; 
            position: relative; 
            overflow: hidden; 
            cursor: pointer;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        
        .pedal-fill { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 0%; 
            transition: height 0.05s linear; 
        }
        
        #brake-base { border-color: rgba(255, 51, 51, 0.3); }
        #throttle-base { border-color: rgba(0, 255, 204, 0.3); }

        #brake-fill { background: linear-gradient(to top, rgba(255,51,51,0.2), var(--accent-red)); }
        #throttle-fill { background: linear-gradient(to top, rgba(0,255,204,0.2), var(--accent-green)); }
        
        .pedal-label { 
            margin-top: 8px;
            font-size: 12px; 
            font-weight: 600; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }

        /* Start Overlay */
        #start-overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(10, 14, 23, 0.95); 
            display:flex; flex-direction:column; justify-content:center; align-items:center; 
            z-index:100; backdrop-filter: blur(5px);
        }
        .overlay-title { font-size: 32px; font-weight: 800; letter-spacing: 4px; margin-bottom: 10px; color: var(--text-main); }
        .overlay-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 40px; letter-spacing: 1px; }
        
        #start-btn { 
            background: var(--accent-red); 
            color: white; 
            border: none; 
            padding: 16px 40px; 
            font-family: var(--font-sans);
            font-size: 16px; 
            border-radius: 4px; 
            font-weight: 800; 
            letter-spacing: 2px; 
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255,51,51,0.4); 
            transition: all 0.2s;
            text-transform: uppercase;
        }
        #start-btn:hover { background: #ff4d4d; box-shadow: 0 0 30px rgba(255,51,51,0.6); transform: scale(1.05); }
    </style>
</head>
<body>

<div id="start-overlay">
    <div class="overlay-title">F1 SIMULATOR</div>
    <div class="overlay-sub">V2.0 - TELEMETRY & AUDIO ENGINES</div>
    <button id="start-btn">INITIALIZE SYSTEM</button>
</div>

<div id="dashboard-container">
    <div class="dashboard-header">
        <div class="dashboard-title">Scuderia Telemetry</div>
        <div class="status-indicator">
            <div class="status-dot"></div>
            LIVE DATA
        </div>
    </div>

    <div class="led-module">
        <div class="led-strip">
            <div class="led verde" id="led-0"></div><div class="led verde" id="led-1"></div><div class="led verde" id="led-2"></div><div class="led verde" id="led-3"></div><div class="led verde" id="led-4"></div>
            <div class="led rojo" id="led-5"></div><div class="led rojo" id="led-6"></div><div class="led rojo" id="led-7"></div><div class="led rojo" id="led-8"></div><div class="led rojo" id="led-9"></div>
            <div class="led azul" id="led-10"></div><div class="led azul" id="led-11"></div><div class="led azul" id="led-12"></div><div class="led azul" id="led-13"></div><div class="led azul" id="led-14"></div>
        </div>
    </div>

    <div class="telemetry-display">
        <div class="data-panel speed-panel">
            <div class="data-label">Speed</div>
            <div><span id="val-speed" class="data-value">0</span><span class="data-unit">km/h</span></div>
        </div>
        
        <div class="data-panel gear-panel">
            <div class="data-label">Gear</div>
            <div id="val-gear">N</div>
        </div>
        
        <div class="data-panel">
            <div class="data-label">Delta</div>
            <div><span class="data-value" style="color: var(--accent-green); font-size: 24px;">-0.124</span><span class="data-unit">s</span></div>
        </div>
    </div>

    <div class="rpm-row">
        <span class="data-label">Engine RPM</span>
        <span id="val-rpm" class="rpm-value">4000</span>
    </div>

    <div class="controls-area">
        <button class="paddle" id="paddle-down">
            <span class="paddle-icon">◀</span> Downshift
        </button>
        <button class="paddle" id="paddle-up">
            Upshift <span class="paddle-icon">▶</span>
        </button>

        <div class="pedal-container">
            <div class="pedal-wrapper">
                <div class="pedal-base" id="brake-base">
                    <div class="pedal-fill" id="brake-fill"></div>
                </div>
                <div class="pedal-label">Brake</div>
            </div>
            
            <div class="pedal-wrapper">
                <div class="pedal-base" id="throttle-base">
                    <div class="pedal-fill" id="throttle-fill"></div>
                </div>
                <div class="pedal-label">Throttle</div>
            </div>
        </div>
    </div>
</div>

<script>
'use strict';

// ----------------------------------------------------------------------
// PHYSICS ENGINE V2.0 - Realistic F1 Speeds (Converted from MPH to KM/H)
// ----------------------------------------------------------------------
// F1 cars use different gear ratios depending on the track. These numbers
// represent aggressive acceleration curves where 1st gear hits ~130km/h 
// very quickly, and 8th gear can push past 340km/h.
const GEAR_LIMITS = { 
    '-1': 80, 
    '0': 0, 
    '1': 135, // ~83 mph
    '2': 180, // ~111 mph
    '3': 220, // ~136 mph
    '4': 255, // ~158 mph
    '5': 285, // ~177 mph
    '6': 310, // ~192 mph
    '7': 335, // ~208 mph
    '8': 360  // ~223 mph
};

const RPM_IDLE = 4000;
const RPM_MAX = 15000;
const RPM_LEDS_START = 10000;

// Acceleration force multiplier (higher = faster acceleration)
// Adjusted to match the rapid climbing seen in the reference videos.
const ACCEL_RATE = 160; 
const BRAKE_RATE = 300; // Carbon-ceramic brakes are extremely powerful
const AERO_DRAG = 0.03; // Drag coefficient

const state = { speed: 0, gear: 0, rpm: RPM_IDLE, throttle: 0, brake: 0 };
const keys = { throttle: false, brake: false };

let audioCtx = null;
let osc1 = null, osc2 = null, filter = null, mainGain = null;
let lastTime = performance.now();

// ----------------------------------------------------------------------
// AUDIO ENGINE 
// ----------------------------------------------------------------------
function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    mainGain = audioCtx.createGain();
    mainGain.gain.value = 0.0;
    
    // Lowpass filter to simulate engine block/exhaust muffling
    filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 1000;
    filter.Q.value = 2; // Adds slight resonance

    // Osc1: Fundamental V6 frequency
    osc1 = audioCtx.createOscillator();
    osc1.type = 'sawtooth';
    
    // Osc2: High-frequency turbo whine / harmonics
    osc2 = audioCtx.createOscillator();
    osc2.type = 'square';
    osc2.detune.value = 12;

    osc1.connect(filter);
    osc2.connect(filter);
    filter.connect(mainGain);
    mainGain.connect(audioCtx.destination);
    
    osc1.start();
    osc2.start();
}

// ----------------------------------------------------------------------
// METALLIC PADDLE SHIFT SOUND
// ----------------------------------------------------------------------
function playPaddleClick() {
    if (!audioCtx) return;
    
    // Create an oscillator for the metallic "ping"
    let clickOsc = audioCtx.createOscillator();
    clickOsc.type = 'sine'; // Sine wave for pure tone
    clickOsc.frequency.setValueAtTime(2500, audioCtx.currentTime); // High pitch (2.5kHz)
    clickOsc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.03); // Quick pitch drop

    // Add some noise for the mechanical "clack"
    let bufferSize = audioCtx.sampleRate * 0.05; // 50ms of noise
    let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    let data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
    }
    let noise = audioCtx.createBufferSource();
    noise.buffer = buffer;

    // Filter the noise to make it sound like carbon fiber/metal
    let noiseFilter = audioCtx.createBiquadFilter();
    noiseFilter.type = 'highpass';
    noiseFilter.frequency.value = 1500;

    // Fast envelope to make it sound like a sharp click
    let clickGain = audioCtx.createGain();
    clickGain.gain.setValueAtTime(0.0, audioCtx.currentTime);
    clickGain.gain.linearRampToValueAtTime(0.6, audioCtx.currentTime + 0.005); // Instant attack
    clickGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05); // Fast decay

    // Connections
    clickOsc.connect(clickGain);
    noise.connect(noiseFilter);
    noiseFilter.connect(clickGain);
    clickGain.connect(audioCtx.destination);

    // Play
    clickOsc.start();
    noise.start();
    clickOsc.stop(audioCtx.currentTime + 0.05);
}


// ----------------------------------------------------------------------
// MAIN PHYSICS LOOP
// ----------------------------------------------------------------------
function updatePhysics(currentTime) {
    let dt = (currentTime - lastTime) / 1000;
    if (dt > 0.1) dt = 1/60; // Prevent huge jumps if tab is inactive
    lastTime = currentTime;

    // Smooth pedal inputs
    state.throttle += ((keys.throttle ? 1 : 0) - state.throttle) * 15 * dt;
    state.brake += ((keys.brake ? 1 : 0) - state.brake) * 20 * dt;
    
    // Clamp values
    state.throttle = Math.max(0, Math.min(1, state.throttle));
    state.brake = Math.max(0, Math.min(1, state.brake));

    // Update UI Pedals
    document.getElementById('throttle-fill').style.height = (state.throttle * 100) + '%';
    document.getElementById('brake-fill').style.height = (state.brake * 100) + '%';

    let maxSpeedAllowed = GEAR_LIMITS[state.gear];

    if (state.gear === 0) {
        // Neutral: Speed decays, RPM revs freely based on throttle
        state.speed -= state.speed * AERO_DRAG * dt;
        if (keys.brake) state.speed -= BRAKE_RATE * dt;
        if (state.speed < 0) state.speed = 0;
        
        let targetRpm = RPM_IDLE + (state.throttle * (RPM_MAX - RPM_IDLE));
        state.rpm += (targetRpm - state.rpm) * 10 * dt;
    } else {
        // In Gear: Accelerate or Brake
        if (keys.throttle && state.speed < maxSpeedAllowed) {
            // Constant strong acceleration
            state.speed += ACCEL_RATE * state.throttle * dt; 
        }
        if (keys.brake) {
            state.speed -= BRAKE_RATE * state.brake * dt; 
        }
        
        // Aero drag increases with speed
        state.speed -= (state.speed * AERO_DRAG) * dt; 
        if (state.speed < 0) state.speed = 0;

        // Hard limit at gear max speed
        if (state.speed > maxSpeedAllowed) state.speed = maxSpeedAllowed;

        // Calculate RPM based on speed within current gear
        let prevLimit = state.gear === 1 ? 0 : GEAR_LIMITS[state.gear - 1];
        let speedInGearRange = state.speed - prevLimit;
        let gearRangeSize = maxSpeedAllowed - prevLimit;
        
        let pct = speedInGearRange / gearRangeSize;
        if (pct < 0) pct = 0;
        if (pct > 1) pct = 1;
        
        // Base RPM calculation
        let targetRpm = RPM_IDLE + (pct * (RPM_MAX - RPM_IDLE));
        
        // Rev Limiter Effect (Bouncing at max RPM)
        if (state.speed >= maxSpeedAllowed - 1 && keys.throttle) {
             targetRpm = RPM_MAX - (Math.random() * 500); // erratic bouncing
        }

        // Smooth RPM changes
        state.rpm += (targetRpm - state.rpm) * 15 * dt;
    }

    // Update UI Tel
