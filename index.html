<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Simulador F1 - Control Ergonómico</title>
    <style>
        * { 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
            touch-action: none; /* Bloquea zooms y retrasos del navegador */
        }
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #05070a; 
            font-family: 'Arial', sans-serif; 
            color: #ffffff; 
            display: flex;
            flex-direction: column;
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* Interfaz estilo Cabina / Volante */
        .game-layout {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            height: 100%;
            width: 100%;
        }

        /* Paneles laterales táctiles gigantes */
        .pedal-side {
            display: flex;
            flex-direction: column;
            justify-content: stretch;
            padding: 15px;
            height: 100%;
        }
        
        .btn-pedal {
            flex: 1;
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: inset 0 -8px 0 rgba(0,0,0,0.4), 0 6px 12px rgba(0,0,0,0.5);
            transition: transform 0.05s;
        }
        .btn-pedal:active {
            transform: scale(0.97);
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.4), 0 2px 4px rgba(0,0,0,0.5);
        }
        
        .btn-brake { background: linear-gradient(135deg, #cc1133, #880011); }
        .btn-throttle { background: linear-gradient(135deg, #00b377, #006633); }

        /* Panel Central: Dashboard y Cambios */
        .center-dash {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10px;
            background: radial-gradient(circle, #0e141d 0%, #05070a 100%);
            border-left: 2px solid #1a232d;
            border-right: 2px solid #1a232d;
        }

        .telemetry {
            text-align: center;
            margin-top: 20px;
        }
        .gear-display { 
            font-size: 110px; 
            font-weight: bold; 
            color: #ff3333; 
            text-shadow: 0 0 25px rgba(255, 51, 51, 0.7); 
            line-height: 1;
        }
        .rpm-text { 
            font-size: 20px; 
            color: #00ffcc; 
            font-family: monospace; 
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* Barras Visuales de presión debajo del número */
        .bars-container {
            width: 100%;
            display: flex;
            gap: 8px;
            margin: 15px 0;
            padding: 0 10px;
        }
        .bar-wrapper {
            flex: 1;
            height: 15px;
            background-color: #11161b;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #222e3b;
            position: relative;
        }
        .bar-fill {
            height: 100%;
            width: 0%;
            transition: width 0.05s ease-out;
        }
        #brake-fill { background-color: #ff3333; box-shadow: 0 0 8px #ff3333; }
        #throttle-fill { background-color: #00ffcc; box-shadow: 0 0 8px #00ffcc; }

        /* Botones de cambio inferiores */
        .shifters {
            display: flex;
            width: 100%;
            gap: 10px;
            margin-bottom: 10px;
        }
        .btn-gear {
            flex: 1;
            padding: 20px 5px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            color: white;
            background: linear-gradient(130deg, #223142, #121b26);
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.5), 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn-gear:active {
            transform: translateY(2px);
        }

        /* Pantalla de inicio */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #start-btn { background: #ff3333; color: white; border: none; padding: 18px 45px; font-size: 20px; border-radius: 8px; font-weight: bold; text-transform: uppercase; box-shadow: 0 0 20px rgba(255,51,51,0.4); }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="font-family:monospace; font-size:30px; margin-bottom:25px; color:#00ffcc; text-align:center;">ENGINES READY</h1>
        <button id="start-btn">START SIMULATION</button>
    </div>

    <div class="game-layout">
        <div class="pedal-side">
            <button class="btn-pedal btn-brake" id="btn-brake">FRENO</button>
        </div>

        <div class="center-dash">
            <div class="telemetry">
                <div class="gear-display" id="gear-indicator">1</div>
                <div class="rpm-text" id="rpm-indicator">RPM: 4000</div>
            </div>

            <div class="bars-container">
                <div class="bar-wrapper"><div class="bar-fill" id="brake-fill"></div></div>
                <div class="bar-wrapper"><div class="bar-fill" id="throttle-fill"></div></div>
            </div>

            <div class="shifters">
                <button class="btn-gear" id="btn-down">DOWN</button>
                <button class="btn-gear" id="btn-up">UP</button>
            </div>
        </div>

        <div class="pedal-side">
            <button class="btn-pedal btn-throttle" id="btn-throttle">GAS</button>
        </div>
    </div>

    <script>
        const gearIndicator = document.getElementById('gear-indicator');
        const rpmIndicator = document.getElementById('rpm-indicator');
        const throttleFill = document.getElementById('throttle-fill');
        const brakeFill = document.getElementById('brake-fill');

        const audioReposo = new Audio('motor_reposo.mp3');
        const audioRectaFull = new Audio('recta_full.mp3');
        const audioSubiendoMarchas = new Audio('subiendo_marchas.mp3');
        const audioContinuacionDown = new Audio('continuacion_down.mp3');
        const audioUp = new Audio('click_up.mp3');
        const audioDown = new Audio('down_marcha.mp3');

        audioReposo.loop = true;
        audioRectaFull.loop = true;

        let marchaActual = 1;
        let rpm = 4000;
        let iniciado = false;
        let acelerando = false;
        let frenando = false;
        let enSecuenciaLarga = false;

        let audioCtx, gainReposo, gainRecta, gainSecuencia, gainContDown;

        function initWebAudio() {
            if (iniciado) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            gainReposo = audioCtx.createGain();
            gainRecta = audioCtx.createGain();
            gainSecuencia = audioCtx.createGain();
            gainContDown = audioCtx.createGain();

            audioCtx.createMediaElementSource(audioReposo).connect(gainReposo).connect(audioCtx.destination);
            audioCtx.createMediaElementSource(audioRectaFull).connect(gainRecta).connect(audioCtx.destination);
            audioCtx.createMediaElementSource(audioSubiendoMarchas).connect(gainSecuencia).connect(audioCtx.destination);
            audioCtx.createMediaElementSource(audioContinuacionDown).connect(gainContDown).connect(audioCtx.destination);

            gainReposo.gain.setValueAtTime(1.0, audioCtx.currentTime);
            gainRecta.gain.setValueAtTime(0.0, audioCtx.currentTime);
            gainSecuencia.gain.setValueAtTime(0.0, audioCtx.currentTime);
            gainContDown.gain.setValueAtTime(0.0, audioCtx.currentTime);

            audioReposo.play().catch(e => {});
            audioRectaFull.play().catch(e => {});
            audioSubiendoMarchas.play().catch(e => {});
            audioSubiendoMarchas.pause(); 
            audioContinuacionDown.play().catch(e => {});
            audioContinuacionDown.pause();

            iniciado = true;
        }

        function presionarGas() {
            initWebAudio();
            acelerando = true;
            frenando = false;
            throttleFill.style.width = "100%";
            brakeFill.style.width = "0%";

            let t = audioCtx.currentTime;
            gainContDown.gain.setTargetAtTime(0.0, t, 0.03);
            gainReposo.gain.setTargetAtTime(0.0, t, 0.03);

            if (marchaActual >= 3) {
                enSecuenciaLarga = true;
                gainRecta.gain.setTargetAtTime(0.0, t, 0.03);
                if (audioSubiendoMarchas.paused) audioSubiendoMarchas.play().catch(e => {});
                gainSecuencia.gain.setTargetAtTime(1.0, t, 0.05);
            } else {
                enSecuenciaLarga = false;
                gainSecuencia.gain.setTargetAtTime(0.0, t, 0.03);
                gainRecta.gain.setTargetAtTime(1.0, t, 0.05);
            }
        }

        function soltarGas() {
            acelerando = false;
            throttleFill.style.width = "0%";
            if (frenando) return;

            let t = audioCtx.currentTime;
            gainRecta.gain.setTargetAtTime(0.0, t, 0.06);
            gainSecuencia.gain.setTargetAtTime(0.0, t, 0.06);
            gainReposo.gain.setTargetAtTime(1.0, t, 0.08);
        }

        function presionarFreno() {
            initWebAudio();
            frenando = true;
            acelerando = false;
            brakeFill.style.width = "100%";
            throttleFill.style.width = "0%";

            let t = audioCtx.currentTime;
            enSecuenciaLarga = false;

            gainRecta.gain.setTargetAtTime(0.0, t, 0.03);
            gainSecuencia.gain.setTargetAtTime(0.0, t, 0.03);
            gainReposo.gain.setTargetAtTime(1.0, t, 0.05);
        }

        function soltarFreno() {
            frenando = false;
            brakeFill.style.width = "0%";
        }

        // EVENTOS TÁCTILES MEJORADOS (MÓVIL)
        document.getElementById('btn-throttle').addEventListener('touchstart', (e) => { e.preventDefault(); presionarGas(); });
        document.getElementById('btn-throttle').addEventListener('touchend', (e) => { e.preventDefault(); soltarGas(); });
        
        document.getElementById('btn-brake').addEventListener('touchstart', (e) => { e.preventDefault(); presionarFreno(); });
        document.getElementById('btn-brake').addEventListener('touchend', (e) => { e.preventDefault(); soltarFreno(); });

        // Compatibilidad PC por si acaso
        document.getElementById('btn-throttle').addEventListener('mousedown', presionarGas);
        document.getElementById('btn-throttle').addEventListener('mouseup', soltarGas);
        document.getElementById('btn-brake').addEventListener('mousedown', presionarFreno);
        document.getElementById('btn-brake').addEventListener('mouseup', soltarFreno);

        document.getElementById('btn-up').addEventListener('click', () => {
            initWebAudio();
            if (marchaActual < 8) {
                marchaActual++;
                let t = audioCtx.currentTime;
                gainSecuencia.gain.setValueAtTime(0.1, t);
                gainRecta.gain.setValueAtTime(0.1, t);
                
                audioUp.currentTime = 0;
                audioUp.play().catch(e => {});

                setTimeout(() => {
                    let now = audioCtx.currentTime;
                    if (acelerando) {
                        if (marchaActual >= 3) {
                            enSecuenciaLarga = true;
                            audioSubiendoMarchas.play().catch(e => {});
                            gainSecuencia.gain.setTargetAtTime(1.0, now, 0.04);
                        } else {
                            gainRecta.gain.setTargetAtTime(1.0, now, 0.04);
                        }
                    }
                }, 60);
                actualizarPantalla();
            }
        });

        document.getElementById('btn-down').addEventListener('click', () => {
            initWebAudio();
            if (marchaActual > 1) {
                marchaActual--;
                enSecuenciaLarga = false;
                let t = audioCtx.currentTime;

                audioDown.currentTime = 0;
                audioDown.play().catch(e => {});

                audioContinuacionDown.currentTime = 0;
                audioContinuacionDown.play().catch(e => {});
                
                gainContDown.gain.setValueAtTime(1.0, t);
                gainSecuencia.gain.setTargetAtTime(0.0, t, 0.02);
                
                if (acelerando) {
                    gainRecta.gain.setTargetAtTime(1.0, t, 0.05);
                } else {
                    gainReposo.gain.setTargetAtTime(1.0, t, 0.04);
                }
                actualizarPantalla();
            }
        });

        function actualizarPantalla() {
            gearIndicator.innerText = marchaActual;
            if (acelerando) {
                rpm = Math.floor(12000 + (marchaActual * 200) + (Math.random() * 120));
            } else if (frenando) {
                rpm = Math.floor(6500 + (marchaActual * 180));
            } else {
                rpm = Math.floor(4000 + (Math.random() * 60));
            }
            rpmIndicator.innerText = `RPM: ${rpm}`;
        }

        setInterval(() => {
            if (!iniciado) return;
            actualizarPantalla();

            if (marchaActual === 8 && enSecuenciaLarga && audioSubiendoMarchas.currentTime >= 21.4) {
                let now = audioCtx.currentTime;
                enSecuenciaLarga = false;
                gainRecta.gain.setTargetAtTime(1.0, now, 0.05);
                gainSecuencia.gain.setTargetAtTime(0.0, now, 0.05);
            }
        }, 1000 / 30);

        document.getElementById('start-btn').addEventListener('click', () => {
            initWebAudio();
            document.getElementById('start-overlay').style.display = 'none';
        });
    </script>
</body>
</html>
